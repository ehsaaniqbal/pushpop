<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="920" viewBox="0 0 1600 920" role="img" aria-label="PP0 Phase 1 winner architecture diagram">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#f7fbff"/>
      <stop offset="100%" stop-color="#eef5ff"/>
    </linearGradient>
    <linearGradient id="tokenGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#3a86ff"/>
      <stop offset="100%" stop-color="#2d5be3"/>
    </linearGradient>
    <linearGradient id="posGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#38b99e"/>
      <stop offset="100%" stop-color="#2a8f7a"/>
    </linearGradient>
    <linearGradient id="blockGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#ffffff"/>
      <stop offset="100%" stop-color="#f3f7ff"/>
    </linearGradient>
    <linearGradient id="outGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#ff9f1c"/>
      <stop offset="100%" stop-color="#e26a00"/>
    </linearGradient>
    <filter id="softShadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="3" stdDeviation="4" flood-color="#1e2a3a" flood-opacity="0.12"/>
    </filter>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#5c6f88"/>
    </marker>
    <style>
      .title { font: 700 34px "Avenir Next", "Segoe UI", sans-serif; fill: #12233b; }
      .subtitle { font: 500 16px "Avenir Next", "Segoe UI", sans-serif; fill: #38506c; }
      .label { font: 600 15px "Avenir Next", "Segoe UI", sans-serif; fill: #14304f; }
      .small { font: 500 13px "Avenir Next", "Segoe UI", sans-serif; fill: #355271; }
      .tiny { font: 500 12px "Avenir Next", "Segoe UI", sans-serif; fill: #4a6684; }
      .conn { stroke: #5c6f88; stroke-width: 2.1; fill: none; marker-end: url(#arrow); }
      .resid { stroke: #9a4dff; stroke-width: 2.3; fill: none; marker-end: url(#arrow); stroke-dasharray: 6 6; }
      .group { fill: url(#blockGrad); stroke: #9fb2cc; stroke-width: 1.5; }
    </style>
  </defs>

  <rect x="0" y="0" width="1600" height="920" fill="url(#bgGrad)"/>
  <rect x="28" y="24" width="1544" height="872" rx="22" fill="#ffffff" stroke="#d5e1ef" stroke-width="1.5"/>

  <text x="56" y="78" class="title">PP0 Phase 1 Winner: Decoder-Only Transformer</text>
  <text x="56" y="108" class="subtitle">Token Embedding + Positional Embedding -> 4x Transformer Blocks -> Final LN -> Unembedding -> Vocab Logits</text>

  <g transform="translate(56,140)">
    <rect x="0" y="0" width="1488" height="92" rx="14" fill="#f6f9ff" stroke="#d3deee"/>
    <text x="18" y="32" class="label">Winning Spec</text>
    <text x="18" y="58" class="small">vocab=19  |  context_length=32  |  d_model=512  |  d_mlp=1024  |  n_layers=4  |  n_heads=8</text>
    <text x="18" y="81" class="small">Best fresh holdout exact=0.9669  |  task: PP0 full final-stack prediction</text>
  </g>

  <g transform="translate(60,258)" filter="url(#softShadow)">
    <circle cx="86" cy="220" r="58" fill="url(#tokenGrad)"/>
    <text x="86" y="214" text-anchor="middle" class="label" fill="#ffffff">Token</text>
    <text x="86" y="234" text-anchor="middle" class="label" fill="#ffffff">Embedding</text>
    <text x="86" y="258" text-anchor="middle" class="tiny" fill="#e8f1ff">[B,T,512]</text>

    <circle cx="86" cy="420" r="58" fill="url(#posGrad)"/>
    <text x="86" y="414" text-anchor="middle" class="label" fill="#ffffff">Position</text>
    <text x="86" y="434" text-anchor="middle" class="label" fill="#ffffff">Embedding</text>
    <text x="86" y="458" text-anchor="middle" class="tiny" fill="#ebfff9">[T,512]</text>

    <circle cx="278" cy="320" r="64" fill="#f8fbff" stroke="#4f6b8a" stroke-width="2"/>
    <text x="278" y="310" text-anchor="middle" class="label">Add</text>
    <text x="278" y="332" text-anchor="middle" class="label">x = tok + pos</text>
    <text x="278" y="356" text-anchor="middle" class="tiny">[B,T,512]</text>

    <path d="M 144 220 C 182 220, 206 270, 224 300" class="conn"/>
    <path d="M 144 420 C 182 420, 206 370, 224 340" class="conn"/>
  </g>

  <g transform="translate(400,250)">
    <rect x="0" y="0" width="820" height="490" rx="18" class="group" filter="url(#softShadow)"/>
    <text x="24" y="34" class="label">4x TransformerBlock (pre-LN, causal self-attention, residual, pre-LN, MLP, residual)</text>

    <g transform="translate(22,62)">
      <rect x="0" y="0" width="184" height="396" rx="14" fill="#ffffff" stroke="#b4c4d9"/>
      <text x="92" y="28" text-anchor="middle" class="label">Block 1</text>
      <circle cx="92" cy="88" r="28" fill="#ecf2ff" stroke="#7e95b3"/>
      <text x="92" y="93" text-anchor="middle" class="small">LN1</text>
      <circle cx="92" cy="170" r="32" fill="#e7efff" stroke="#748fb4"/>
      <text x="92" y="167" text-anchor="middle" class="small">Causal</text>
      <text x="92" y="184" text-anchor="middle" class="small">MHA</text>
      <circle cx="92" cy="252" r="28" fill="#ecf2ff" stroke="#7e95b3"/>
      <text x="92" y="257" text-anchor="middle" class="small">LN2</text>
      <circle cx="92" cy="334" r="32" fill="#e8f8ff" stroke="#6a9bb8"/>
      <text x="92" y="331" text-anchor="middle" class="small">MLP</text>
      <text x="92" y="348" text-anchor="middle" class="tiny">512->1024->512</text>
      <path d="M 92 116 L 92 138" class="conn"/>
      <path d="M 92 202 L 92 224" class="conn"/>
      <path d="M 92 280 L 92 302" class="conn"/>
      <path d="M 14 56 C -10 56, -10 214, 14 214" class="resid"/>
      <path d="M 170 214 C 194 214, 194 378, 170 378" class="resid"/>
    </g>

    <g transform="translate(218,62)">
      <rect x="0" y="0" width="184" height="396" rx="14" fill="#ffffff" stroke="#b4c4d9"/>
      <text x="92" y="28" text-anchor="middle" class="label">Block 2</text>
      <circle cx="92" cy="88" r="28" fill="#ecf2ff" stroke="#7e95b3"/>
      <text x="92" y="93" text-anchor="middle" class="small">LN1</text>
      <circle cx="92" cy="170" r="32" fill="#e7efff" stroke="#748fb4"/>
      <text x="92" y="167" text-anchor="middle" class="small">Causal</text>
      <text x="92" y="184" text-anchor="middle" class="small">MHA</text>
      <circle cx="92" cy="252" r="28" fill="#ecf2ff" stroke="#7e95b3"/>
      <text x="92" y="257" text-anchor="middle" class="small">LN2</text>
      <circle cx="92" cy="334" r="32" fill="#e8f8ff" stroke="#6a9bb8"/>
      <text x="92" y="331" text-anchor="middle" class="small">MLP</text>
      <text x="92" y="348" text-anchor="middle" class="tiny">512->1024->512</text>
      <path d="M 92 116 L 92 138" class="conn"/>
      <path d="M 92 202 L 92 224" class="conn"/>
      <path d="M 92 280 L 92 302" class="conn"/>
      <path d="M 14 56 C -10 56, -10 214, 14 214" class="resid"/>
      <path d="M 170 214 C 194 214, 194 378, 170 378" class="resid"/>
    </g>

    <g transform="translate(414,62)">
      <rect x="0" y="0" width="184" height="396" rx="14" fill="#ffffff" stroke="#b4c4d9"/>
      <text x="92" y="28" text-anchor="middle" class="label">Block 3</text>
      <circle cx="92" cy="88" r="28" fill="#ecf2ff" stroke="#7e95b3"/>
      <text x="92" y="93" text-anchor="middle" class="small">LN1</text>
      <circle cx="92" cy="170" r="32" fill="#e7efff" stroke="#748fb4"/>
      <text x="92" y="167" text-anchor="middle" class="small">Causal</text>
      <text x="92" y="184" text-anchor="middle" class="small">MHA</text>
      <circle cx="92" cy="252" r="28" fill="#ecf2ff" stroke="#7e95b3"/>
      <text x="92" y="257" text-anchor="middle" class="small">LN2</text>
      <circle cx="92" cy="334" r="32" fill="#e8f8ff" stroke="#6a9bb8"/>
      <text x="92" y="331" text-anchor="middle" class="small">MLP</text>
      <text x="92" y="348" text-anchor="middle" class="tiny">512->1024->512</text>
      <path d="M 92 116 L 92 138" class="conn"/>
      <path d="M 92 202 L 92 224" class="conn"/>
      <path d="M 92 280 L 92 302" class="conn"/>
      <path d="M 14 56 C -10 56, -10 214, 14 214" class="resid"/>
      <path d="M 170 214 C 194 214, 194 378, 170 378" class="resid"/>
    </g>

    <g transform="translate(610,62)">
      <rect x="0" y="0" width="184" height="396" rx="14" fill="#ffffff" stroke="#b4c4d9"/>
      <text x="92" y="28" text-anchor="middle" class="label">Block 4</text>
      <circle cx="92" cy="88" r="28" fill="#ecf2ff" stroke="#7e95b3"/>
      <text x="92" y="93" text-anchor="middle" class="small">LN1</text>
      <circle cx="92" cy="170" r="32" fill="#e7efff" stroke="#748fb4"/>
      <text x="92" y="167" text-anchor="middle" class="small">Causal</text>
      <text x="92" y="184" text-anchor="middle" class="small">MHA</text>
      <circle cx="92" cy="252" r="28" fill="#ecf2ff" stroke="#7e95b3"/>
      <text x="92" y="257" text-anchor="middle" class="small">LN2</text>
      <circle cx="92" cy="334" r="32" fill="#e8f8ff" stroke="#6a9bb8"/>
      <text x="92" y="331" text-anchor="middle" class="small">MLP</text>
      <text x="92" y="348" text-anchor="middle" class="tiny">512->1024->512</text>
      <path d="M 92 116 L 92 138" class="conn"/>
      <path d="M 92 202 L 92 224" class="conn"/>
      <path d="M 92 280 L 92 302" class="conn"/>
      <path d="M 14 56 C -10 56, -10 214, 14 214" class="resid"/>
      <path d="M 170 214 C 194 214, 194 378, 170 378" class="resid"/>
    </g>

    <path d="M 190 260 L 210 260" class="conn"/>
    <path d="M 386 260 L 406 260" class="conn"/>
    <path d="M 582 260 L 602 260" class="conn"/>
  </g>

  <g transform="translate(1260,278)" filter="url(#softShadow)">
    <circle cx="86" cy="154" r="48" fill="#f5f8ff" stroke="#6f88a8" stroke-width="2"/>
    <text x="86" y="159" text-anchor="middle" class="label">Final LN</text>

    <circle cx="86" cy="322" r="58" fill="url(#outGrad)"/>
    <text x="86" y="314" text-anchor="middle" class="label" fill="#ffffff">Unembed</text>
    <text x="86" y="334" text-anchor="middle" class="label" fill="#ffffff">Linear</text>
    <text x="86" y="356" text-anchor="middle" class="tiny" fill="#fff2df">512 -> 19</text>

    <circle cx="256" cy="322" r="58" fill="#fff8ec" stroke="#d88a28" stroke-width="2"/>
    <text x="256" y="314" text-anchor="middle" class="label">Vocab</text>
    <text x="256" y="334" text-anchor="middle" class="label">Logits</text>
    <text x="256" y="356" text-anchor="middle" class="tiny">[B,T,19]</text>

    <path d="M 86 202 L 86 260" class="conn"/>
    <path d="M 144 322 L 194 322" class="conn"/>
  </g>

  <path d="M 348 578 C 380 578, 390 510, 400 510" class="conn"/>
  <path d="M 1220 510 C 1240 510, 1242 432, 1260 432" class="conn"/>

  <g transform="translate(74,798)">
    <rect x="0" y="0" width="1450" height="78" rx="12" fill="#f9fbff" stroke="#d7e2f1"/>
    <circle cx="36" cy="39" r="8" fill="#9a4dff"/>
    <text x="54" y="44" class="small">Dashed purple paths indicate residual additions within each transformer block.</text>
    <text x="690" y="44" class="small">Causal MHA uses 8 heads; each block keeps the stream width at d_model=512.</text>
  </g>
</svg>
